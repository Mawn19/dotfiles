# Don't add an empty line before the prompt

# --------------------------------
# General
# --------------------------------
add_newline = false

format = """
[](fg:#D8D365)\
$username$hostname\
[î‚°](fg:#D8D365 bg:#5E81AC)\
$directory\
[î‚°](fg:#5E81AC bg:#B48EAD)\
$git_branch\
$git_status\
[î‚°](fg:#B48EAD bg:#A3BE8C)\
$cmd_duration\
[î‚°](fg:#A3BE8C bg:#BF616A)\
$status\
[î‚° ](fg:#BF616A)\
$line_break\
$character
"""

# --------------------------------
# User
# --------------------------------
[username]
show_always = true
style_user = "fg:black bg:#D8D365"
style_root = "fg:white bg:#BF616A"
format = "[ $user ]($style)"

# --------------------------------
# Host (only via SSH)
# --------------------------------
[hostname]
ssh_only = false
style = "fg:black bg:#D8D365"
format = "[@ $hostname ]($style)"

# --------------------------------
# Directory
# --------------------------------
[directory]
style = "fg:black bg:#5E81AC"
format = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "â€¦/"

# --------------------------------
# Git Branch
# --------------------------------
[git_branch]
symbol = "î‚ "
style = "fg:black bg:#B48EAD"
format = "[ $symbol $branch ]($style)"

# --------------------------------
# Git Status
# --------------------------------
[git_status]
style = "fg:black bg:#B48EAD"
format = "[ $all_status$ahead_behind ]($style)"

# --------------------------------
# Command Duration
# --------------------------------
[cmd_duration]
min_time = 500
style = "fg:black bg:#A3BE8C"
format = "[ took $duration ]($style)"

# --------------------------------
# Exit Status (only shows on error)
# --------------------------------
[status]
disabled = true
symbol = "âś—"
success_symbol = ""
style = "fg:white bg:#BF616A"
format = "[ $symbol$status ]($style)"

# --------------------------------
# Prompt Character
# --------------------------------
[character]
success_symbol = "[âžś](bold green)"
error_symbol = "[âžś](bold red)"
